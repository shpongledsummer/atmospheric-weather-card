name: Bug Report
description: Report an issue or visual bug
body:
  - type: markdown
    attributes:
      value: |
        Please complete the troubleshooting steps below before submitting. This helps filter out conflicts with complex layouts or custom themes so I can actually fix the bug faster!
  - type: checkboxes
    id: troubleshooting
    attributes:
      label: Required Troubleshooting
      description: You MUST confirm these steps. Most visual "bugs" are actually caused by custom layouts, grids, or themes.
      options:
        - label: I have tested the card isolated as a single card on a brand new, blank dashboard (outside of any custom layout-cards, grids, or stacks) and the issue persists.
          required: true
        - label: I have temporarily switched to the default Home Assistant theme and the issue persists.
          required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: Clearly describe the issue. What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant are you running?
    validations:
      required: true
  - type: input
    id: card-version
    attributes:
      label: Card Version
      description: What version of this card are you using?
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser / App
      description: Where are you seeing this visual bug?
      options:
        - Google Chrome
        - Mozilla Firefox
        - Apple Safari
        - Microsoft Edge
        - Home Assistant Companion App (iOS)
        - Home Assistant Companion App (Android)
        - Fully Kiosk Browser
        - Other
    validations:
      required: true
  - type: textarea
    id: yaml-code
    attributes:
      label: ONLY Your Weather Card's YAML
      description: Paste the exact YAML for the Atmospheric Weather Card ONLY. Do NOT paste your entire dashboard, wrapping layout cards, or custom grids here.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Information
      description: Add screenshots (highly recommended!), browser console error logs. If you suspect a layout conflict and want to share your full dashboard YAML, drop that here.
    validations:
      required: false
